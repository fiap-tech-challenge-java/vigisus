version: "3.9"

# As variáveis abaixo são lidas automaticamente do arquivo .env na raiz do projeto.
# Copie .env.example para .env e preencha os valores antes de executar o Compose.

services:
  postgres:
    image: postgres:15
    container_name: vigisus-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-vigisus}
      POSTGRES_USER: ${DB_USER:-vigisus}
      POSTGRES_PASSWORD: ${DB_PASS:-vigisus123}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vigisus}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigisus-backend
    environment:
      # O host "postgres" corresponde ao nome do serviço acima dentro da rede Docker.
      DB_URL: jdbc:postgresql://postgres:5432/${DB_NAME:-vigisus}
      DB_USER: ${DB_USER:-vigisus}
      DB_PASS: ${DB_PASS:-vigisus123}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # REACT_APP_* deve ser fornecido em tempo de build pois o CRA incorpora o valor no bundle.
        REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8080}
    container_name: vigisus-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  seed:
    build:
      context: ./data-pipeline
      dockerfile: Dockerfile
    container_name: vigisus-seed
    command: python seed_mock.py
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-vigisus}
      DB_USER: ${DB_USER:-vigisus}
      DB_PASS: ${DB_PASS:-vigisus123}
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_started
    restart: no

volumes:
  postgres_data:
