version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: vigisus-postgres
    environment:
      POSTGRES_DB: vigisus
      POSTGRES_USER: vigisus
      POSTGRES_PASSWORD: vigisus123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigisus"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vigisus-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/vigisus
      SPRING_DATASOURCE_USERNAME: vigisus
      SPRING_DATASOURCE_PASSWORD: vigisus123
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vigisus-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
