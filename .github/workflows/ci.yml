name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    name: Backend — build e testes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: vigisus_test
          POSTGRES_USER: vigisus
          POSTGRES_PASSWORD: vigisus123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build e testes com cobertura
        env:
          DB_URL: jdbc:postgresql://localhost:5432/vigisus_test
          DB_USER: vigisus
          DB_PASS: vigisus123
          GEMINI_API_KEY: ""
        run: ./mvnw verify jacoco:report --no-transfer-progress

      - name: Upload relatório JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 7
