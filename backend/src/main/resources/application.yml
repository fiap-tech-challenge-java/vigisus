spring:
  application:
    name: vigisus
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/vigisus}
    username: ${DB_USER:vigisus}
    password: ${DB_PASS:vigisus123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

vigisus:
  ia:
    provider: gemini
    api-key: ${GEMINI_API_KEY:}
    model: gemini-2.5-flash
    max-tokens: 500

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    show-sql: false

vigisus:
  ia:
    api-key: ${GEMINI_API_KEY:}
