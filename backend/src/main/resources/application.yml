spring:
  application:
    name: vigisus
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/vigisus}
    username: ${SPRING_DATASOURCE_USERNAME:vigisus}
    password: ${SPRING_DATASOURCE_PASSWORD:vigisus123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

server:
  port: 8080

vigisus:
  ia:
    api-key: ${VIGISUS_IA_API_KEY:}
    model: ${VIGISUS_IA_MODEL:gpt-4o-mini}
    url: ${VIGISUS_IA_URL:https://api.openai.com/v1/chat/completions}
